<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="utf-8"/>
<title>FM Map Romania & Moldova</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
html, body { margin:0; padding:0; background: #000; }
#map { height:100vh; width:100vw; }

/* popup distance line */
.dist-info-popup{
    color:#00ff00;
    font-size:12px;
    display:block;
    margin-bottom:6px;
}
</style>
</head>

<body>
<div id="map"></div>

<script>

/* ================= MAP ================= */
var map = L.map('map').setView([46.1, 26.5], 7);

L.tileLayer('https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{ maxZoom: 19 }).addTo(map);

/* ================= ICONS ================= */
var txIcon = L.icon({
    iconUrl: 'https://i.ibb.co/nMzymZsq/tower.png',
    iconSize: [36,36],
    iconAnchor:[18,36],
    popupAnchor:[0,-36]
});

var receiverIcon = L.icon({
    iconUrl: 'https://i.ibb.co/MkmK51LJ/yagi.png',
    iconSize: [34,34],
    iconAnchor:[17,34]
});

/* ================= GLOBALS ================= */
let receiverMarker=null;
let distanceLine=null;
let geoLayer=null;
let allStations=[];

/* ================= UTILS ================= */

function formatDistance(km){
    if(km<1) return Math.round(km*1000)+" m";
    return Math.round(km)+" km";
}

function bearing(a,b){
    let l1=a.lat*Math.PI/180,l2=b.lat*Math.PI/180;
    let dl=(b.lng-a.lng)*Math.PI/180;
    let y=Math.sin(dl)*Math.cos(l2);
    let x=Math.cos(l1)*Math.sin(l2)-Math.sin(l1)*Math.cos(l2)*Math.cos(dl);
    return (Math.atan2(y,x)*180/Math.PI+360)%360;
}

/* ================= REVERSE GEOCODE ================= */
async function updateReceiverLocation(){
    if(!receiverMarker) return;

    let p=receiverMarker.getLatLng();
    receiverMarker.setPopupContent("<b>Searching location...</b>").openPopup();

    try{
        let url=`https://nominatim.openstreetmap.org/reverse?format=json&lat=${p.lat}&lon=${p.lng}&zoom=12&addressdetails=1`;
        let r=await fetch(url,{headers:{"Accept":"application/json"}});
        let d=await r.json();

        let name=d.address.city||d.address.town||d.address.village||d.address.county||"Unknown location";
        receiverMarker.setPopupContent(`<b>📍 ${name}</b><br>(right click to remove)`);

    }catch{
        receiverMarker.setPopupContent(`<b>📍 Unknown location</b>`);
    }
}

/* ================= RECEIVER EVENTS ================= */
function attachReceiverEvents(){

    receiverMarker.off();

    receiverMarker.on("drag",()=>{
        if(distanceLine){
            map.removeLayer(distanceLine);
            distanceLine=null;
        }
    });

    receiverMarker.on("dragend",()=>{
        updateReceiverLocation();
    });

    receiverMarker.on("contextmenu",()=>{
        if(distanceLine){
            map.removeLayer(distanceLine);
            distanceLine=null;
        }
        map.removeLayer(receiverMarker);
        receiverMarker=null;
    });
}

/* ================= PLACE RECEIVER ================= */
map.on("contextmenu",e=>{
    if(e.originalEvent.target.closest(".leaflet-marker-icon")) return;

    if(receiverMarker) map.removeLayer(receiverMarker);

    receiverMarker=L.marker(e.latlng,{icon:receiverIcon,draggable:true}).addTo(map);
    attachReceiverEvents();
    updateReceiverLocation();
});

/* ================= STATIONS ================= */

fetch("fm.json").then(r=>r.json()).then(data=>{
    allStations=data.features;
    drawStations();
});

function drawStations(){

geoLayer=L.geoJSON({type:"FeatureCollection",features:allStations},{
    pointToLayer:(feature,latlng)=>L.marker(latlng,{icon:txIcon}),

    onEachFeature:(feature,layer)=>{

        let name=feature.properties.name||"TX";
        let latlng=layer.getLatLng();

        function buildPopup(){
            let distHTML="";
            if(receiverMarker){
                let rx=receiverMarker.getLatLng();
                let d=map.distance(rx,latlng)/1000;
                let az=bearing(rx,latlng);
                distHTML=`<span class="dist-info-popup">📏 ${formatDistance(d)} | 🧭 ${az.toFixed(0)}°</span>`;
            }
            return `<b>${name}</b><br>${distHTML}`;
        }

        /* POPUP */
        layer.bindPopup(buildPopup());
        layer.on("popupopen",()=>layer.setPopupContent(buildPopup()));

        /* TOOLTIP LIVE DISTANCE */
        layer.bindTooltip(name,{direction:"top",offset:[0,-20]});

        layer.on("mouseover",e=>{
            let txt=name;

            if(receiverMarker){
                let rx=receiverMarker.getLatLng();
                let d=map.distance(rx,e.latlng)/1000;
                let az=bearing(rx,e.latlng);

                txt+=`<br>Dist: ${formatDistance(d)}<br>Beam: ${az.toFixed(0)}°`;
            }

            layer.setTooltipContent(txt);
        });

        /* MEASURE LINE */
        layer.on("contextmenu",e=>{
            if(!receiverMarker) return;

            if(distanceLine) map.removeLayer(distanceLine);

            distanceLine=L.polyline(
                [receiverMarker.getLatLng(),e.latlng],
                {color:"red",weight:3,dashArray:"6,6"}
            ).addTo(map);

            /* IMPORTANT FIX */
            distanceLine.on("contextmenu",()=>{
                map.removeLayer(distanceLine);
                distanceLine=null;
            });

            layer.openPopup();
        });
    }

}).addTo(map);

}

</script>
</body>
</html>
