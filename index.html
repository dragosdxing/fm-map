<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="utf-8"/>
<title>FM Map Romania & Moldova</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
@import url('https://fonts.cdnfonts.com/css/ds-digital');

html, body { margin:0; padding:0; background: #000; }
#map { height:100vh; width:100vw; }

.status-error-text { color: #ff4444 !important; font-weight: bold; }
.error-icon-style { filter: hue-rotate(140deg) brightness(0.9) saturate(4); }

#radioPanel {
    position: absolute; top: 10px; left: 60px;
    background: #2b2d31; color: #eee; padding: 16px 20px;
    border-radius: 8px; border: 1px solid #1e1f22;
    box-shadow: 0 4px 15px rgba(0,0,0,0.8); z-index: 1000;
    font-family: Arial, sans-serif; font-size: 14px; width: 280px;
}

.lcd-screen {
    background: #111; border: 1px solid #000; border-radius: 4px;
    padding: 4px 12px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; min-width: 80px;
}

#freqInput { 
    background: transparent; border: none; color: #00ff00; 
    font-family: 'DS-Digital', sans-serif; font-size: 30px;
    text-align: center; width: 100%; outline: none;
}

.mhz-label { color: #00ff00; font-size: 11px; margin-top: -2px; }

.tune-btn {
    width: 36px; height: 36px; cursor: pointer;
    background: #383a40; color: #fff; border: 1px solid #2b2d31;
    border-radius: 4px; font-size: 18px;
}

.countryBtn { cursor: pointer; padding: 6px 16px; border: 1px solid #555; background: #383a40; color: #fff; border-radius: 4px; }
.countryBtn.active { background: #00ff00; color: #111; }

.action-row { display: flex; gap: 8px; margin-top: 20px; }
.action-btn {
    flex: 1; padding: 8px 4px; background: transparent; color: #fff; 
    border: 1px solid #fff; border-radius: 4px; font-weight: bold;
    font-size: 11px; text-align: center; text-decoration: none;
}

.rds-box {
    display: inline-block; background: #111; color: #00ff00 !important;
    font-family: 'Courier New', monospace; padding: 2px 6px;
    border-radius: 3px; font-weight: bold; min-width: 95px; text-align: center;
}

.leaflet-popup-content-wrapper { background: rgba(25, 25, 25, 0.85); backdrop-filter: blur(4px); color: #fff; border: 1px solid #444; }
.leaflet-popup-content { margin: 14px; line-height: 1.5; }
hr { border: 0; border-top: 1px solid #555; margin: 10px 0; }

.leaflet-tooltip {
    background: rgba(25, 25, 25, 0.9); color: #fff; 
    border: 1px solid #444; padding: 6px 10px; font-size: 13px; text-align: center;
}

.cov-btn { background: #333; color: #00ff00; border: 1px solid #00ff00; padding: 6px 10px; border-radius: 4px; cursor: pointer; width: 100%; }
.cov-btn.active-cov { background: #ff4444; color: #fff; border-color: #ff4444; }
.dist-info-popup { font-size: 12px; color: #00ff00; margin-top: -8px; margin-bottom: 8px; display: block; }
</style>
</head>

<body>

<div id="radioPanel">
    <div style="margin-bottom: 12px; font-size: 16px; text-align: center;"><b>📻 Frequency</b></div>
    <div style="display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 20px;">
        <button class="tune-btn" onclick="stepFreq(-0.1)">-</button>
        <div class="lcd-screen">
            <input id="freqInput" type="text" value="97.9">
            <div class="mhz-label">MHz</div>
        </div>
        <button class="tune-btn" onclick="stepFreq(0.1)">+</button>
    </div>
    <div style="display: flex; justify-content: center; gap: 8px;">
        <button id="btn-ro" class="countryBtn active" onclick="setCountry('ro')">Romania</button>
        <button id="btn-md" class="countryBtn" onclick="setCountry('md')">Moldova</button>
    </div>
    <div class="action-row">
        <button id="geoBtn" class="action-btn" onclick="locateUser()">📍 Geolocation</button>
        <a href="https://www.youtube.com/@DragosDXing" target="_blank" class="action-btn">▶️ My Youtube</a>
    </div>
</div>

<div id="map"></div>

<script>
var map = L.map('map').setView([46.1, 26.5], 7);
L.tileLayer('https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{ maxZoom: 19 }).addTo(map);
L.tileLayer('https://services.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}',{ maxZoom: 19 }).addTo(map);

var txIcon = L.icon({
    iconUrl: 'https://i.ibb.co/nMzymZsq/tower.png', 
    iconSize: [36, 36], iconAnchor: [18, 36], popupAnchor: [0, -36], tooltipAnchor: [0, -36]
});

var receiverIcon = L.icon({
    iconUrl: 'https://i.ibb.co/MkmK51LJ/yagi.png',
    iconSize: [34, 34], iconAnchor: [17, 34], popupAnchor: [0, -30]
});

let geoLayer = null, allStations = [], receiverMarker = null, distanceLine = null, activeCoverages = {}, currentTxCoords = null;

function formatDistance(km){ return km < 1 ? Math.round(km * 1000) + " m" : Math.round(km) + " km"; }

function updateDistanceLine() {
    if (receiverMarker && currentTxCoords && distanceLine) {
        distanceLine.setLatLngs([receiverMarker.getLatLng(), currentTxCoords]);
    }
}

function tune(){
    let freq = parseFloat(document.getElementById("freqInput").value);
    if(geoLayer) map.removeLayer(geoLayer);
    currentTxCoords = null; // Resetăm ținta liniei la schimbarea frecvenței
    if(distanceLine) { map.removeLayer(distanceLine); distanceLine = null; }

    let filtered = allStations.filter(f => {
        let matches = (f.properties.description || "").match(/\b(?:8[7-9]|9\d|10[0-8])[\.,]\d+\b/g);
        return matches && matches.some(m => Math.abs(parseFloat(m.replace(",", ".")) - freq) <= 0.05);
    });

    geoLayer = L.geoJSON({ type: "FeatureCollection", features: filtered }, {
        pointToLayer: (feature, latlng) => {
            let marker = L.marker(latlng, {icon: txIcon});
            if((feature.properties.description || "").includes("OFF")) marker.on('add', function(){ this._icon.classList.add('error-icon-style'); });
            return marker;
        },
        onEachFeature: (feature, layer) => {
            let latlng = L.latLng(feature.geometry.coordinates[1], feature.geometry.coordinates[0]);
            
            let updateTooltip = () => {
                let content = `<b>${feature.properties.name}</b>`;
                if (receiverMarker) {
                    let d = map.distance(receiverMarker.getLatLng(), latlng) / 1000;
                    content += `<br><span style="color:#00ff00;">📏 ${formatDistance(d)}</span>`;
                }
                layer.setTooltipContent(content);
            };

            layer.bindTooltip("", { direction: 'top' });
            layer.on('mouseover', updateTooltip);

            layer.on("contextmenu", (e) => {
                L.DomEvent.stopPropagation(e);
                if(!receiverMarker) return;
                currentTxCoords = latlng;
                if(distanceLine) map.removeLayer(distanceLine);
                distanceLine = L.polyline([receiverMarker.getLatLng(), latlng], {color: "red", weight: 3, dashArray: "5, 5"}).addTo(map);
                layer.openPopup();
            });

            layer.bindPopup(`<b>${feature.properties.name}</b><hr>${feature.properties.description}`);
        }
    }).addTo(map);
}

map.on("contextmenu", (e) => {
    if(receiverMarker) map.removeLayer(receiverMarker);
    if(distanceLine) { map.removeLayer(distanceLine); distanceLine = null; currentTxCoords = null; }
    
    receiverMarker = L.marker(e.latlng, { icon: receiverIcon, draggable: true }).addTo(map);
    
    receiverMarker.on("drag", updateDistanceLine);
    
    receiverMarker.on("contextmenu", (ev) => {
        L.DomEvent.stopPropagation(ev);
        map.removeLayer(receiverMarker);
        receiverMarker = null;
        if(distanceLine) { map.removeLayer(distanceLine); distanceLine = null; currentTxCoords = null; }
    });
});

function stepFreq(delta) {
    let i = document.getElementById("freqInput");
    let v = parseFloat(i.value) + delta;
    i.value = (v < 87.5 ? 108 : (v > 108 ? 87.5 : v)).toFixed(1);
    tune();
}

function setCountry(c){
    document.getElementById("btn-ro").classList.toggle("active", c === 'ro');
    document.getElementById("btn-md").classList.toggle("active", c === 'md');
    fetch(c === 'ro' ? 'fm.json' : 'fm_md.json').then(r => r.json()).then(data => { allStations = data.features; tune(); });
}

function bearing(a, b){
    let l1 = a.lat * Math.PI / 180, l2 = b.lat * Math.PI / 180;
    let dl = (b.lng - a.lng) * Math.PI / 180;
    return (Math.atan2(Math.sin(dl) * Math.cos(l2), Math.cos(l1) * Math.sin(l2) - Math.sin(l1) * Math.cos(l2) * Math.cos(dl)) * 180 / Math.PI + 360) % 360;
}

setCountry('ro');
</script>
</body>
</html>
