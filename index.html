<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="utf-8"/>
<title>FM Map Romania & Moldova</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
@import url('https://fonts.cdnfonts.com/css/ds-digital');

html, body { margin:0; padding:0; background: #000; overflow: hidden; }
#map { height:100vh; width:100vw; }

.error-badge { color: #ff4444 !important; font-weight: bold; }
@keyframes blink-warning {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
}
.warning-emoji {
    animation: blink-warning 1.5s infinite;
}

.error-icon-style { filter: hue-rotate(140deg) brightness(0.9) saturate(4); }

#radioPanel {
    position: absolute; top: 10px; left: 10px; 
    background: #2b2d31; color: #eee; padding: 16px 20px;
    border-radius: 8px; border: 1px solid #1e1f22;
    box-shadow: 0 4px 15px rgba(0,0,0,0.8); z-index: 1000;
    font-family: Arial, sans-serif; font-size: 14px; width: 280px;
}

@media (min-width: 600px) { #radioPanel { left: 60px; } }

.lcd-screen {
    background: #111; border: 1px solid #000; border-radius: 4px;
    padding: 4px 12px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; min-width: 80px;
}

#freqInput { 
    background: transparent; border: none; color: #00ff00; 
    font-family: 'DS-Digital', sans-serif; font-size: 30px;
    text-align: center; width: 100%; outline: none;
}

.mhz-label { color: #00ff00; font-size: 11px; margin-top: -2px; }

.tune-btn {
    width: 36px; height: 36px; cursor: pointer;
    background: #383a40; color: #fff; border: 1px solid #2b2d31;
    border-radius: 4px; font-size: 18px;
}

.countryBtn { cursor: pointer; padding: 6px 16px; border: 1px solid #555; background: #383a40; color: #fff; border-radius: 4px; }
.countryBtn.active { background: #00ff00; color: #111; }

.action-row { display: flex; gap: 8px; margin-top: 20px; flex-wrap: wrap; }
.action-btn {
    flex: 1; padding: 8px 4px; background: transparent; color: #fff; 
    border: 1px solid #fff; border-radius: 4px; font-weight: bold;
    font-size: 11px; text-align: center; text-decoration: none;
    min-width: 80px; cursor: pointer;
}

.rds-box {
    display: inline-block; background: #111; color: #00ff00 !important;
    font-family: 'Courier New', monospace; padding: 2px 6px;
    border-radius: 3px; font-weight: bold; min-width: 95px; text-align: center;
}

.leaflet-popup-content-wrapper { background: rgba(25, 25, 25, 0.95); backdrop-filter: blur(4px); color: #fff; border: 1px solid #444; }
.leaflet-popup-content { margin: 14px; line-height: 1.6; min-width: 250px; }
hr { border: 0; border-top: 1px solid #555; margin: 10px 0; }

.leaflet-tooltip {
    background: rgba(25, 25, 25, 0.9); color: #fff; 
    border: 1px solid #444; padding: 6px 10px; font-size: 13px; text-align: center;
}

.dist-val { color: #ffffff !important; font-weight: bold; }

.cov-btn { background: #333; color: #00ff00; border: 1px solid #00ff00; padding: 10px; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold; }
.cov-btn.active-cov { background: #ff4444; color: #fff; border-color: #ff4444; }
.dist-info-popup { font-size: 12px; color: #aaa; margin-bottom: 8px; display: block; border-bottom: 1px solid #444; padding-bottom: 5px; }

.receiver-popup .leaflet-popup-content { min-width: 10px !important; margin: 8px 12px; white-space: nowrap; text-align: center; font-size: 14px; }
.receiver-popup .leaflet-popup-close-button { display: none; }
</style>
</head>

<body>

<div id="radioPanel">
    <div style="margin-bottom: 12px; font-size: 16px; text-align: center;"><b>📻 Frequency</b></div>
    <div style="display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 20px;">
        <button class="tune-btn" onclick="stepFreq(-0.1)">-</button>
        <div class="lcd-screen">
            <input id="freqInput" type="text" value="97.9" inputmode="decimal">
            <div class="mhz-label">MHz</div>
        </div>
        <button class="tune-btn" onclick="stepFreq(0.1)">+</button>
    </div>
    <div style="display: flex; justify-content: center; gap: 8px;">
        <button id="btn-ro" class="countryBtn active" onclick="setCountry('ro')">Romania</button>
        <button id="btn-md" class="countryBtn" onclick="setCountry('md')">Moldova</button>
    </div>
    <div class="action-row">
        <button id="geoBtn" class="action-btn" onclick="locateUser()">📍 Geolocation</button>
        <a href="https://servers.fmdx.org/" target="_blank" class="action-btn">📻 TEF Servers</a>
        <a href="https://www.youtube.com/@DragosDXing" target="_blank" class="action-btn">▶️ My Youtube</a>
    </div>
</div>

<div id="map"></div>

<script>
var map = L.map('map', { tap: false }).setView([46.1, 26.5], 7);
L.tileLayer('https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{ maxZoom: 19 }).addTo(map);
L.tileLayer('https://services.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}',{ maxZoom: 19 }).addTo(map);

var txIcon = L.icon({
    iconUrl: 'https://i.ibb.co/nMzymZsq/tower.png', 
    iconSize: [36, 36], iconAnchor: [18, 36], popupAnchor: [0, -36], tooltipAnchor: [0, -36]
});

var receiverIcon = L.icon({
    iconUrl: 'https://i.ibb.co/4RgHttTy/tef.png', 
    iconSize: [48, 32],      
    iconAnchor: [24, 16],    
    popupAnchor: [0, -18]
});

let geoLayer = null, allStations = [], receiverMarker = null, distanceLine = null, activeCoverages = {}, currentTxCoords = null;

const countyMap = {
    "Alba": "AB", "Arad": "AR", "Argeș": "AG", "Bacău": "BC", "Bihor": "BH", "Bistrița-Năsăud": "BN",
    "Botoșani": "BT", "Brașov": "BV", "Brăila": "BR", "Buzău": "BZ", "Caraș-Severin": "CS",
    "Călărași": "CL", "Cluj": "CJ", "Constanța": "CT", "Covasna": "CV", "Dâmbovița": "DB",
    "Dolj": "DJ", "Galați": "GL", "Giurgiu": "GR", "Gorj": "GJ", "Harghita": "HR",
    "Hunedoara": "HD", "Ialomița": "IL", "Iași": "IS", "Ilfov": "IF", "Maramureș": "MM",
    "Mehedinți": "MH", "Mureș": "MS", "Neamț": "NT", "Olt": "OT", "Prahova": "PH",
    "Satu Mare": "SM", "Sălaj": "SJ", "Sibiu": "SB", "Suceava": "SV", "Teleorman": "TR",
    "Timiș": "TM", "Tulcea": "TL", "Vaslui": "VS", "Vâlcea": "VL", "Vrancea": "VN",
    "București": "B", "Municipiul București": "B"
};

// FUNCȚIE ACTUALIZATĂ: Recunoaște formatul de oră cu secunde (ex: h:mm:ss, _h:mm:ss)
function getDynamicRDS(text) {
    let now = new Date();
    let hh = String(now.getHours()).padStart(2, '0');
    let mm = String(now.getMinutes()).padStart(2, '0');
    let ss = String(now.getSeconds()).padStart(2, '0');
    let dd = String(now.getDate()).padStart(2, '0');
    let mo = String(now.getMonth() + 1).padStart(2, '0');
    let yy = String(now.getFullYear()).slice(-2);
    
    return text
        .replace(/_h:mm:ss/gi, `${hh}:${mm}:${ss}`)
        .replace(/hh:mm:ss/gi, `${hh}:${mm}:${ss}`)
        .replace(/h:mm:ss/gi, `${hh}:${mm}:${ss}`)
        .replace(/HH:MM/gi, `${hh}:${mm}`)
        .replace(/DD\.MM\.YY/gi, `${dd}.${mo}.${yy}`);
}

function formatDistance(km){ return km < 1 ? Math.round(km * 1000) + " m" : Math.round(km) + " km"; }

function updateLine() {
    if (receiverMarker && currentTxCoords && distanceLine) {
        distanceLine.setLatLngs([receiverMarker.getLatLng(), currentTxCoords]);
    }
}

async function getLocationName(lat, lon){
    try {
        let url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=12&addressdetails=1`;
        let r = await fetch(url, { headers: { "Accept": "application/json" } });
        let data = await r.json();
        if(!data.address) return "Unknown location";
        
        let locName = data.address.city || data.address.town || data.address.village || data.address.municipality || "Unknown";
        let county = data.address.county || "";
        county = county.replace("Județul ", "").replace(" County", "").trim();
        
        let abr = countyMap[county];
        return abr ? `${locName}, ${abr}` : locName;
    } catch { return "Unknown location"; }
}

function bindReceiverPopup(lat, lng) {
    receiverMarker.bindPopup("<b>⏳ Searching...</b>", { className: 'receiver-popup', autoClose: false, closeOnClick: false }).openPopup();
    getLocationName(lat, lng).then(name => {
        if (receiverMarker) receiverMarker.setPopupContent(`<b>📍 ${name}</b>`);
    });
}

function locateUser() {
    let btn = document.getElementById("geoBtn");
    if (!navigator.geolocation) { alert("Geolocation is not supported by your browser."); return; }
    
    btn.innerHTML = "⏳ Locating...";
    navigator.geolocation.getCurrentPosition((position) => {
        const { latitude, longitude } = position.coords;
        const latlng = L.latLng(latitude, longitude);
        
        if (receiverMarker) map.removeLayer(receiverMarker);
        if (distanceLine) { map.removeLayer(distanceLine); distanceLine = null; currentTxCoords = null; }
        
        receiverMarker = L.marker(latlng, { icon: receiverIcon, draggable: true }).addTo(map);
        bindReceiverPopup(latitude, longitude);
        
        receiverMarker.on("drag", updateLine);
        receiverMarker.on("dragend", () => { bindReceiverPopup(receiverMarker.getLatLng().lat, receiverMarker.getLatLng().lng); });
        receiverMarker.on("contextmenu", (ev) => {
            L.DomEvent.stopPropagation(ev);
            map.removeLayer(receiverMarker); receiverMarker = null;
            if (distanceLine) { map.removeLayer(distanceLine); distanceLine = null; currentTxCoords = null; }
        });
        
        map.setView(latlng, 10);
        btn.innerHTML = "📍 Geolocation";
        tune(); 
    }, () => {
        alert("Unable to retrieve your location.");
        btn.innerHTML = "📍 Geolocation";
    });
}

document.getElementById('freqInput').addEventListener('input', function(e) {
    let val = e.target.value.replace(/[^0-9.]/g, '');
    if (val.length >= 3 && !val.includes('.')) {
        if (val.length === 3 || val.length === 4) val = (parseFloat(val) / 10).toFixed(1);
        else if (val.length === 5) val = (parseFloat(val) / 100).toFixed(1);
    }
    if (val > 108) val = 108;
    if (parseFloat(val) >= 87.5) { e.target.value = val; tune(); }
});

window.toggleCoverage = function(lat, lng, powerWatts, btnId) {
    let id = lat + "_" + lng;
    let btn = document.getElementById(btnId);
    if (activeCoverages[id]) {
        map.removeLayer(activeCoverages[id]);
        delete activeCoverages[id];
        if(btn) { btn.innerText = "📶 Show Coverage"; btn.classList.remove('active-cov'); }
        return;
    }
    let rStrong = (Math.pow(powerWatts, 0.25) * 5) * 1000;
    let rWeak = (Math.pow(powerWatts, 0.25) * 9) * 1000;
    activeCoverages[id] = L.layerGroup([
        L.circle([lat, lng], { radius: Math.min(rWeak, 180000), color: 'none', fillColor: '#ffff00', fillOpacity: 0.15 }),
        L.circle([lat, lng], { radius: Math.min(rStrong, 100000), color: 'none', fillColor: '#00ff00', fillOpacity: 0.25 })
    ]).addTo(map);
    if(btn) { btn.innerText = "❌ Hide Coverage"; btn.classList.add('active-cov'); }
};

function tune(){
    let freqValue = document.getElementById("freqInput").value;
    let freq = parseFloat(freqValue);
    if (isNaN(freq)) return;
    
    if(geoLayer) map.removeLayer(geoLayer);
    for (let k in activeCoverages) map.removeLayer(activeCoverages[k]);
    activeCoverages = {};
    if(distanceLine) { map.removeLayer(distanceLine); distanceLine = null; }

    let regexFM = /\b(?:8[7-9]|9\d|10[0-8])[\.,]\d+\b/;
    const errorKeywords = ["(**NO AUDIO**)", "(*BLANK CARRIER*)", "(**OFF**)", "(*NO AUDIO*)"];

    let filtered = allStations.filter(f => {
        let desc = f.properties.description || "";
        let matches = desc.match(new RegExp(regexFM, "g"));
        return matches && matches.some(m => Math.abs(parseFloat(m.replace(",", ".")) - freq) <= 0.05);
    }).map(f => {
        let newF = JSON.parse(JSON.stringify(f));
        let stations = newF.properties.description.split(/(?=\b(?:8[7-9]|9\d|10[0-8])[\.,]\d+\b)/gi);
        let matched = stations.filter(s => {
            let m = s.match(regexFM);
            return m && Math.abs(parseFloat(m[0].replace(",", ".")) - freq) <= 0.05;
        });
        
        let hasError = false;
        let formatted = matched.map(s => {
            let res = s;
            
            errorKeywords.forEach(k => {
                if (res.includes(k)) {
                    hasError = true;
                    res = res.replace(k, `<span class="warning-emoji">⚠️</span> <span class="error-badge">${k}</span> <span class="warning-emoji">⚠️</span>`);
                }
            });
            
            res = res.replace(regexFM, "<b>$&</b>");
            res = res.replace(/(W|kW|w|kw)\s*((?:\[[^\]]+\]\s*)+)/, function(match, p, rds) {
                let rdsMatch = rds.match(/\[([^\]]+)\]/g);
                if(!rdsMatch) return match;
                let frames = rdsMatch.map(x => x.slice(1,-1));
                
                let displayFrame = getDynamicRDS(frames[0]);
                
                return p + ` <span class="rds-box" data-frames="${encodeURIComponent(JSON.stringify(frames))}" data-idx="0">[${displayFrame}]</span>`;
            });
            return res;
        });
        
        newF.properties._processedDesc = formatted.join("<br><hr>");
        newF.properties._hasError = hasError;
        return newF;
    });

    geoLayer = L.geoJSON({ type: "FeatureCollection", features: filtered }, {
        pointToLayer: (feature, latlng) => {
            let m = L.marker(latlng, {icon: txIcon});
            if(feature.properties._hasError) m.on('add', function(){ this._icon.classList.add('error-icon-style'); });
            return m;
        },
        onEachFeature: (feature, layer) => {
            let latlng = L.latLng(feature.geometry.coordinates[1], feature.geometry.coordinates[0]);
            let powerWatts = 100;
            let pMatch = (feature.properties.description || "").match(/-\s*([\d\.,]+)\s*(W|kW)/i);
            if(pMatch) {
                let val = parseFloat(pMatch[1].replace(",", "."));
                powerWatts = pMatch[2].toLowerCase() === "kw" ? val * 1000 : val;
            }

            layer.bindTooltip("", { direction: 'top', sticky: true });
            
            let updateTooltipContent = () => {
                let content = `<b>${feature.properties.name}</b>`;
                if(receiverMarker) {
                    let d = map.distance(receiverMarker.getLatLng(), latlng)/1000;
                    let b = bearing(receiverMarker.getLatLng(), latlng).toFixed(0);
                    content += `<br>Dist: <span class="dist-val">${formatDistance(d)}</span> | Azi: <span class="dist-val">${b}°</span>`;
                }
                layer.setTooltipContent(content);
            };

            layer.on('mouseover click', updateTooltipContent);

            layer.on("contextmenu", (e) => {
                L.DomEvent.stopPropagation(e);
                if(!receiverMarker) return;
                currentTxCoords = latlng;
                if(distanceLine) map.removeLayer(distanceLine);
                distanceLine = L.polyline([receiverMarker.getLatLng(), latlng], {color: "red", weight: 3, dashArray: "5, 5"}).addTo(map);
                layer.openPopup();
                map.flyToBounds(distanceLine.getBounds(), { paddingTopLeft: [50, 220], paddingBottomRight: [50, 50], maxZoom: 14 });
            });

            let btnId = "cov_" + (latlng.lat + latlng.lng).toString().replace(".","");
            layer.bindPopup(() => {
                let dHtml = "";
                if (receiverMarker) {
                    let d = map.distance(receiverMarker.getLatLng(), latlng)/1000;
                    let b = bearing(receiverMarker.getLatLng(), latlng).toFixed(0);
                    dHtml = `<div class="dist-info-popup">Dist: <span class="dist-val">${formatDistance(d)}</span> | Azi: <span class="dist-val">${b}°</span></div>`;
                }
                return `<b>${feature.properties.name}</b><br>${dHtml}${feature.properties._processedDesc}<br><br><button id="${btnId}" class="cov-btn" onclick="toggleCoverage(${latlng.lat}, ${latlng.lng}, ${powerWatts}, '${btnId}')">📶 Show Coverage</button>`;
            });
        }
    }).addTo(map);
}

map.on("contextmenu", (e) => {
    if(e.originalEvent.target.closest(".leaflet-marker-icon")) return;
    if(receiverMarker) map.removeLayer(receiverMarker);
    if(distanceLine) { map.removeLayer(distanceLine); distanceLine = null; currentTxCoords = null; }
    
    receiverMarker = L.marker(e.latlng, { icon: receiverIcon, draggable: true }).addTo(map);
    bindReceiverPopup(e.latlng.lat, e.latlng.lng);
    
    receiverMarker.on("drag", updateLine);
    receiverMarker.on("dragend", () => { bindReceiverPopup(receiverMarker.getLatLng().lat, receiverMarker.getLatLng().lng); });

    receiverMarker.on("contextmenu", (ev) => {
        L.DomEvent.stopPropagation(ev);
        map.removeLayer(receiverMarker); receiverMarker = null;
        if(distanceLine) { map.removeLayer(distanceLine); distanceLine = null; currentTxCoords = null; }
    });
});

setInterval(() => {
    document.querySelectorAll('.rds-box').forEach(box => {
        let frames = JSON.parse(decodeURIComponent(box.dataset.frames));
        let idx = parseInt(box.dataset.idx);
        
        if (frames.length > 1) {
            idx = (idx + 1) % frames.length;
            box.dataset.idx = idx;
        }
        
        box.innerText = `[${getDynamicRDS(frames[idx])}]`;
    });
}, 2500);

function stepFreq(delta) {
    let i = document.getElementById("freqInput");
    let v = parseFloat(i.value) + delta;
    i.value = (v < 87.5 ? 108 : (v > 108 ? 87.5 : v)).toFixed(1);
    tune();
}

function setCountry(c){
    document.getElementById("btn-ro").className = (c=='ro'?'countryBtn active':'countryBtn');
    document.getElementById("btn-md").className = (c=='md'?'countryBtn active':'countryBtn');
    fetch(c=='ro'?'fm.json':'fm_md.json').then(r=>r.json()).then(d=>{allStations=d.features; tune();});
}

function bearing(a, b){
    let l1=a.lat*Math.PI/180, l2=b.lat*Math.PI/180, dl=(b.lng-a.lng)*Math.PI/180;
    return (Math.atan2(Math.sin(dl)*Math.cos(l2), Math.cos(l1)*Math.sin(l2)-Math.sin(l1)*Math.cos(l2)*Math.cos(dl))*180/Math.PI+360)%360;
}
setCountry('ro');
</script>
</body>
</html>
