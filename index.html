<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="utf-8"/>
<title>FM Map Romania & Moldova</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
@import url('https://fonts.cdnfonts.com/css/ds-digital');

html, body { margin:0; padding:0; background: #000; overflow: hidden; }
#map { height:100vh; width:100vw; }

.error-badge { color: #ff4444 !important; font-weight: bold; }
@keyframes blink-warning { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
.warning-emoji { animation: blink-warning 1.5s infinite; }
.error-icon-style { filter: hue-rotate(140deg) brightness(0.9) saturate(4); }

#radioPanel {
    position: absolute; top: 10px; left: 10px; 
    background: #2b2d31; color: #eee; padding: 16px 20px;
    border-radius: 8px; border: 1px solid #1e1f22;
    box-shadow: 0 4px 15px rgba(0,0,0,0.8); z-index: 1000;
    font-family: Arial, sans-serif; font-size: 14px; width: 280px;
}

@media (min-width: 600px) { #radioPanel { left: 60px; } }

.lcd-screen {
    background: #111; border: 1px solid #000; border-radius: 4px;
    padding: 4px 12px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; min-width: 80px;
}

#freqInput { 
    background: transparent; border: none; color: #00ff00; 
    font-family: 'DS-Digital', sans-serif; font-size: 30px;
    text-align: center; width: 100%; outline: none;
}
#freqInput::placeholder { color: #1a5c1a; }

#searchInput { 
    width: 100%; padding: 8px; border: 1px solid #555; background: #111; color: #00ff00; 
    border-radius: 4px; font-family: Arial; font-size: 14px; text-align: center;
    outline: none; box-sizing: border-box; transition: 0.2s;
}
#searchInput::placeholder { color: #555; }
#searchInput:focus { border-color: #00ff00; }

.mhz-label { color: #00ff00; font-size: 11px; margin-top: -2px; }

.tune-btn {
    width: 36px; height: 36px; cursor: pointer;
    background: #383a40; color: #fff; border: 1px solid #2b2d31;
    border-radius: 4px; font-size: 18px;
}

.countryBtn { cursor: pointer; padding: 6px 16px; border: 1px solid #555; background: #383a40; color: #fff; border-radius: 4px; }
.countryBtn.active { background: #00ff00; color: #111; }

.action-row { display: flex; gap: 8px; margin-top: 15px; flex-wrap: wrap; }
.action-btn {
    flex: 1; padding: 8px 4px; background: transparent; color: #fff; 
    border: 1px solid #fff; border-radius: 4px; font-weight: bold;
    font-size: 11px; text-align: center; text-decoration: none;
    min-width: 80px; cursor: pointer;
}

.rds-box {
    display: inline-block; background: #111; color: #00ff00 !important;
    font-family: 'Courier New', monospace; padding: 2px 6px;
    border-radius: 3px; font-weight: bold; min-width: 95px; text-align: center;
}

.leaflet-popup-content-wrapper { background: rgba(25, 25, 25, 0.95); backdrop-filter: blur(4px); color: #fff; border: 1px solid #444; }
.leaflet-popup-content { margin: 14px; line-height: 1.6; min-width: 250px; }
hr { border: 0; border-top: 1px solid #555; margin: 10px 0; }

.leaflet-tooltip {
    background: rgba(25, 25, 25, 0.9); color: #fff; 
    border: 1px solid #444; padding: 6px 10px; font-size: 13px; text-align: center;
}

.dist-val { color: #ffffff !important; font-weight: bold; }
.cov-btn { background: #333; color: #00ff00; border: 1px solid #00ff00; padding: 10px; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
.cov-btn.active-cov { background: #ff4444; color: #fff; border-color: #ff4444; }
.log-btn { background: #28a745; color: #fff; border: 1px solid #28a745; padding: 10px; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 8px; transition: 0.2s; }
.log-btn:active { background: #1e7e34; }

#logModal {
    display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    background: #2b2d31; color: #eee; padding: 20px; border-radius: 8px;
    border: 1px solid #444; box-shadow: 0 10px 40px rgba(0,0,0,0.9);
    z-index: 3000; width: 90%; max-width: 550px; max-height: 80vh; overflow-y: auto;
    font-family: Arial, sans-serif;
}
.log-header { font-size: 18px; font-weight: bold; margin-bottom: 15px; border-bottom: 1px solid #444; padding-bottom: 10px; display:flex; justify-content:space-between; align-items: center;}
.log-list { font-family: 'Courier New', monospace; font-size: 13px; line-height: 1.6; white-space: pre-wrap; margin-bottom: 15px; background: #111; padding: 12px; border-radius: 4px; min-height: 150px; max-height: 40vh; overflow-y: auto; border: 1px solid #000;}
.close-modal { cursor: pointer; color: #ff4444; font-size: 14px; background: rgba(255,68,68,0.1); padding: 4px 8px; border-radius: 4px; }
.log-actions { display: flex; gap: 10px; }
.log-actions button { flex: 1; padding: 10px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
.btn-export { background: #00ff00; color: #111; }
.btn-clear { background: #ff4444; color: #fff; }

.dist-info-popup { font-size: 12px; color: #aaa; margin-bottom: 8px; display: block; border-bottom: 1px solid #444; padding-bottom: 5px; }
.receiver-popup .leaflet-popup-content { min-width: 10px !important; margin: 8px 12px; white-space: nowrap; text-align: center; font-size: 14px; }
.receiver-popup .leaflet-popup-close-button { display: none; }
.dark-osm { filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }

#ro-clock {
    position: absolute; top: 10px; right: 10px; 
    background: #2b2d31; color: #00ff00; padding: 8px 12px;
    border-radius: 8px; border: 1px solid #1e1f22;
    box-shadow: 0 4px 15px rgba(0,0,0,0.8); z-index: 1000;
    font-family: 'DS-Digital', sans-serif; font-size: 24px;
    text-align: center; letter-spacing: 1px;
}
.tz-label { font-size: 14px; font-family: Arial, sans-serif; color: #aaa; margin-left: 5px; }
</style>
</head>

<body>
<div id="radioPanel">
    <div style="margin-bottom: 12px; font-size: 16px; text-align: center;"><b>📻 Control Panel</b></div>
    <div style="display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 10px;">
        <button class="tune-btn" onclick="stepFreq(-0.1)">-</button>
        <div class="lcd-screen">
            <input id="freqInput" type="text" value="" placeholder="---" inputmode="decimal">
            <div class="mhz-label">MHz</div>
        </div>
        <button class="tune-btn" onclick="stepFreq(0.1)">+</button>
    </div>
    <div style="margin-bottom: 15px;">
        <input id="searchInput" type="text" placeholder="Caută rețea, locație sau cod PI..." oninput="document.getElementById('freqInput').value=''; tune();">
    </div>
    <div style="display: flex; justify-content: center; gap: 8px;">
        <button id="btn-ro" class="countryBtn active" onclick="setCountry('ro')">Romania</button>
        <button id="btn-md" class="countryBtn" onclick="setCountry('md')">Moldova</button>
    </div>
    <div class="action-row">
        <button id="geoBtn" class="action-btn" onclick="locateUser()">📍 Geolocation</button>
        <button id="serialBtn" class="action-btn" onclick="connectTEF()">🔌 TEF USB</button>
        <button class="action-btn" onclick="toggleLogModal()">📓 Jurnal DX</button>
        <a href="https://www.youtube.com/@dragosdxing" target="_blank" class="action-btn" style="width: 100%;">▶️ My Youtube</a>
    </div>
</div>

<div id="ro-clock">00:00:00 <span class="tz-label">EET</span></div>

<div id="logModal">
    <div class="log-header">
        <span>📓 DX Reception Log</span>
        <span class="close-modal" onclick="document.getElementById('logModal').style.display='none'">✖ Close</span>
    </div>
    <div id="logContent" class="log-list"></div>
    <div class="log-actions">
        <button class="btn-export" onclick="exportLog()">💾 Export TXT</button>
        <button class="btn-clear" onclick="clearLog()">🗑️ Clear Log</button>
    </div>
</div>

<div id="map"></div>

<script>
var map = L.map('map', { tap: false }).setView([46.1, 26.5], 7);
var esriLayer = L.layerGroup([L.tileLayer('https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'), L.tileLayer('https://services.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}')]);
var osmLayer = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', { className: 'dark-osm' });
var topoLayer = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png');
esriLayer.addTo(map);
L.control.layers({"Satelit": esriLayer, "Dark": osmLayer, "Relief": topoLayer}, null, { position: 'bottomleft' }).addTo(map);

var txIcon = L.icon({ iconUrl: 'tx.png', iconSize: [36, 36], iconAnchor: [18, 36], popupAnchor: [0, -36] });
var receiverIcon = L.icon({ iconUrl: 'rx.png', iconSize: [36, 36], iconAnchor: [18, 18], popupAnchor: [0, -18] });

let geoLayer = null, allStations = [], receiverMarker = null, distanceLine = null, activeCoverages = {}, currentTxCoords = null;
window.dxLog = JSON.parse(localStorage.getItem('dxLog') || '[]');

let tefPort, tefReader;
async function connectTEF() {
    if (!('serial' in navigator)) return alert("Browser mismatch.");
    try {
        tefPort = await navigator.serial.requestPort();
        await tefPort.open({ baudRate: 115200 });
        document.getElementById('serialBtn').innerText = "🔌 TEF Active";
        const textDecoder = new TextDecoderStream();
        tefPort.readable.pipeTo(textDecoder.writable);
        tefReader = textDecoder.readable.getReader();
        let buffer = "";
        while (true) {
            const { value, done } = await tefReader.read();
            if (done) break;
            buffer += value;
            let lines = buffer.split('\n');
            buffer = lines.pop();
            for (let line of lines) {
                let match = line.match(/\b(8[7-9]|9\d|10[0-8])[\.,]?\d{1,2}\b/);
                if (match) {
                    let f = parseFloat(match[0].replace(',', '.'));
                    if(f >= 875) f /= 100;
                    document.getElementById("freqInput").value = f.toFixed(1);
                    tune();
                }
            }
        }
    } catch (e) { console.error(e); }
}

function saveReceiverPos(lat, lng) { localStorage.setItem('savedReceiverPos', JSON.stringify({lat, lng})); }
window.addLogEntry = function(encodedLine, btnElem) {
    let line = decodeURIComponent(encodedLine);
    if(!dxLog.includes(line)) { dxLog.push(line); localStorage.setItem('dxLog', JSON.stringify(dxLog)); }
    if(btnElem) { btnElem.innerText = "✔ Saved!"; setTimeout(() => btnElem.innerText = "✅ Log Station", 1500); }
};

window.toggleLogModal = function() {
    let modal = document.getElementById('logModal');
    let content = document.getElementById('logContent');
    // MESAJUL CERUT IN ENGLEZA:
    content.innerText = dxLog.length > 0 ? dxLog.join('\n') : 'DX Log / Log Reception only works in Frequency Mode.\nSelect a frequency or search for a station to log your reception.';
    modal.style.display = modal.style.display === 'block' ? 'none' : 'block';
};

window.exportLog = function() {
    let blob = new Blob([dxLog.join('\n')], { type: "text/plain" });
    let a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "DX_Log.txt"; a.click();
};

window.clearLog = function() { if(confirm("Clear log?")) { dxLog = []; localStorage.removeItem('dxLog'); toggleLogModal(); toggleLogModal(); } };

function getDynamicRDS(text) {
    let now = new Date(), hh = String(now.getHours()).padStart(2, '0'), mm = String(now.getMinutes()).padStart(2, '0'), ss = String(now.getSeconds()).padStart(2, '0');
    return text.replace(/hh:mm:ss/gi, `${hh}:${mm}:${ss}`).replace(/HH:MM/gi, `${hh}:${mm}`);
}

function tune(){
    let freqValue = document.getElementById("freqInput").value, freq = parseFloat(freqValue);
    let searchTerm = document.getElementById("searchInput").value.toLowerCase().trim();
    let isDefaultView = isNaN(freq) && !searchTerm;
    
    if(geoLayer) map.removeLayer(geoLayer);
    for (let k in activeCoverages) map.removeLayer(activeCoverages[k]);
    activeCoverages = {};

    let regexFM = /\b(?:8[7-9]|9\d|10[0-8])[\.,]\d+\b/;
    let filtered = allStations.filter(f => {
        if (isDefaultView) return true;
        let d = f.properties.description || "", n = f.properties.name || "";
        if (searchTerm) return n.toLowerCase().includes(searchTerm) || d.toLowerCase().includes(searchTerm);
        let matches = d.match(new RegExp(regexFM, "g"));
        return matches && matches.some(m => Math.abs(parseFloat(m.replace(",", ".")) - freq) <= 0.05);
    }).map(f => {
        let newF = JSON.parse(JSON.stringify(f));
        let stations = newF.properties.description.split(/(?=\b(?:8[7-9]|9\d|10[0-8])[\.,]\d+\b)/gi).filter(s => s.trim() !== "");
        let matched = isDefaultView ? stations : (searchTerm ? stations.filter(s => s.toLowerCase().includes(searchTerm) || newF.properties.name.toLowerCase().includes(searchTerm)) : stations.filter(s => { let m = s.match(regexFM); return m && Math.abs(parseFloat(m[0].replace(",", ".")) - freq) <= 0.05; }));
        
        newF.properties._cleanLine = matched[0] ? matched[0].replace(/\[.*?\]/g, '').replace(/<[^>]*>?/gm, '').trim() : "";
        newF.properties._processedDesc = matched.map(s => {
            let res = s.replace(new RegExp(regexFM, "g"), "<b>$&</b>");
            return res.replace(/(W|kW)\s*((?:\[[^\]]+\]\s*)+)/i, (m, p, rds) => {
                let frames = (rds.match(/\[([^\]]+)\]/g) || []).map(x => x.slice(1,-1));
                return p + ` <span class="rds-box" data-frames="${encodeURIComponent(JSON.stringify(frames))}" data-idx="0">[${getDynamicRDS(frames[0]||"")}]</span>`;
            });
        }).join("<br><hr>");
        return newF;
    });

    geoLayer = L.geoJSON({ type: "FeatureCollection", features: filtered }, {
        pointToLayer: (f, ll) => L.marker(ll, {icon: txIcon}),
        onEachFeature: (feature, layer) => {
            let latlng = L.latLng(feature.geometry.coordinates[1], feature.geometry.coordinates[0]);
            layer.bindPopup(() => {
                let dHtml = "", distKm = 0;
                if (receiverMarker) {
                    let d = map.distance(receiverMarker.getLatLng(), latlng)/1000; distKm = d;
                    dHtml = `<div class="dist-info-popup">Dist: <span class="dist-val">${d < 1 ? Math.round(d*1000)+"m" : Math.round(d)+"km"}</span></div>`;
                }
                
                // LOGICA DE ASCUNDERE BUTOANE
                let coverageBtn = isDefaultView ? "" : `<button class="cov-btn" onclick="toggleCoverage(${latlng.lat}, ${latlng.lng}, 100, 'c${latlng.lat}')">📶 Show Coverage</button>`;
                let logLine = encodeURIComponent(`${feature.properties._cleanLine} - ${feature.properties.name} ${distKm>0?Math.round(distKm)+'km':''}`);
                let logBtn = (isDefaultView || !receiverMarker) ? "" : `<button class="log-btn" onclick="addLogEntry('${logLine}', this)">✅ Log Station</button>`;

                return `<b>${feature.properties.name}</b><br>${dHtml}${feature.properties._processedDesc}<br>${coverageBtn}${logBtn}`;
            });
        }
    }).addTo(map);
}

function stepFreq(delta) {
    let i = document.getElementById("freqInput"), v = parseFloat(i.value) || 87.5;
    v += delta; i.value = (v < 87.5 ? 108 : (v > 108 ? 87.5 : v)).toFixed(1);
    tune();
}

function setCountry(c){
    fetch(c=='ro'?'fm.json':'fm_md.json').then(r => r.json()).then(d => { allStations=d.features; tune(); });
    document.getElementById("btn-ro").className = c=='ro'?'countryBtn active':'countryBtn';
    document.getElementById("btn-md").className = c=='md'?'countryBtn active':'countryBtn';
}

function locateUser() {
    navigator.geolocation.getCurrentPosition(p => {
        let ll = L.latLng(p.coords.latitude, p.coords.longitude);
        if(receiverMarker) map.removeLayer(receiverMarker);
        receiverMarker = L.marker(ll, {icon: receiverIcon, draggable: true}).addTo(map);
        saveReceiverPos(ll.lat, ll.lng); tune();
    });
}

setInterval(() => {
    document.querySelectorAll('.rds-box').forEach(box => {
        let frames = JSON.parse(decodeURIComponent(box.dataset.frames));
        if(frames.length < 2) return;
        let idx = (parseInt(box.dataset.idx) + 1) % frames.length;
        box.dataset.idx = idx; box.innerText = `[${getDynamicRDS(frames[idx])}]`;
    });
}, 2500);

window.addEventListener('DOMContentLoaded', () => {
    let saved = localStorage.getItem('savedReceiverPos');
    if(saved) { let p = JSON.parse(saved); receiverMarker = L.marker([p.lat, p.lng], {icon: receiverIcon, draggable: true}).addTo(map); }
    setCountry('ro');
});

setInterval(() => {
    let d = new Date();
    document.getElementById('ro-clock').innerHTML = d.toLocaleTimeString('ro-RO') + ' <span class="tz-label">EET</span>';
}, 1000);
</script>
</body>
</html>
