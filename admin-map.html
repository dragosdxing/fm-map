<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - FM Map</title>
    <style>
        body {
            background-color: #050508;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .admin-panel {
            background: rgba(15, 15, 15, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 30px;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        h2 { text-align: center; color: #ff9900; margin-top: 0; }
        label { display: block; margin-top: 15px; color: #aaaaaa; font-size: 14px; }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: inherit;
        }
        textarea { height: 180px; resize: vertical; white-space: pre-wrap; }
        input:focus, select:focus, textarea:focus { border-color: #ff9900; outline: none; }
        
        button {
            margin-top: 15px;
            width: 100%;
            padding: 12px;
            background: #ff9900;
            color: #000;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background: #ffaa33; }
        button:disabled { background: #555; cursor: not-allowed; }
        
        .btn-load { background: #0066cc; color: white; margin-top: 10px; }
        .btn-load:hover { background: #0088ff; }

        .toolbar {
            display: flex;
            gap: 10px;
            margin-top: 5px;
            margin-bottom: 5px;
            flex-wrap: wrap;
        }
        .tool-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
            width: auto;
            margin-top: 0;
        }
        .tool-btn:hover { background: rgba(255, 255, 255, 0.2); border-color: #ff9900; color: #fff; }

        .settings-group {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            border: 1px dashed rgba(255,255,255,0.1);
        }
        #status { margin-top: 20px; text-align: center; font-weight: bold; }
        .success { color: #00ff00; }
        .error { color: #ff4d4d; }
        
        .editor-section {
            display: none; /* Ascuns până se încarcă datele */
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <div class="admin-panel">
        <h2>🗺️ FM Map - Editare Posturi</h2>

        <div class="settings-group">
            <label>Nume Repository:</label>
            <input type="text" id="repoName" value="fm-map"> <label>GitHub Token:</label>
            <input type="password" id="githubToken" placeholder="Introdu token-ul aici...">
            
            <button type="button" class="btn-load" id="loadBtn" onclick="loadMapData()">📥 Încarcă Lista de pe Hartă</button>
        </div>
        
        <div id="status"></div>

        <div class="editor-section" id="editorSection">
            <label>Selectează Locația (Emițătorul):</label>
            <select id="stationSelect" onchange="onStationSelect()">
                <option value="">-- Alege o locație --</option>
            </select>

            <label>Nume Locație:</label>
            <input type="text" id="locName">

            <label>Datele posturilor (Frecvență, Nume, RDS):</label>
            <div class="toolbar">
                <button type="button" class="tool-btn" onclick="insertTag(' [BLANK]')">🟡 Adaugă [BLANK]</button>
                <button type="button" class="tool-btn" onclick="insertTag(' (OFF AIR)')">🔴 Adaugă (OFF AIR)</button>
                <button type="button" class="tool-btn" onclick="insertTag(' (**IN PLAN**)')">⚪ Adaugă (**IN PLAN**)</button>
            </div>
            <textarea id="locDescription" placeholder="Informațiile despre posturile de radio..."></textarea>

            <button type="button" onclick="saveMapData()" id="saveBtn">💾 Salvează Modificările pe Hartă</button>
        </div>
    </div>

    <script>
        let mapData = null; // Aici vom ține tot JSON-ul uriaș
        let fileSha = ""; // Ne trebuie ca să suprascriem fișierul

        // Funcții pentru Base64 (suportă diacritice)
        function b64EncodeUnicode(str) {
            return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, function toSolidBytes(match, p1) { return String.fromCharCode('0x' + p1); }));
        }

        function b64DecodeUnicode(str) {
            return decodeURIComponent(atob(str).split('').map(function(c) { return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2); }).join(''));
        }

        // 1. DESCĂRCAREA DATELOR DE PE GITHUB
        async function loadMapData() {
            const token = document.getElementById('githubToken').value.trim();
            const repo = document.getElementById('repoName').value.trim();
            const statusEl = document.getElementById('status');
            const loadBtn = document.getElementById('loadBtn');

            if (!token || !repo) {
                statusEl.innerHTML = '<span class="error">Te rog introdu Token-ul și Numele Repo-ului!</span>';
                return;
            }

            loadBtn.disabled = true;
            loadBtn.innerText = "Se încarcă datele...";
            statusEl.innerHTML = 'Se descarcă fm.json...';

            const owner = 'dragosdxing'; 
            const path = 'fm.json'; 
            const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;

            try {
                const getRes = await fetch(apiUrl, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!getRes.ok) throw new Error("Nu am putut accesa fm.json. Verifică Token-ul și Numele Repo-ului.");
                
                const fileData = await getRes.json();
                fileSha = fileData.sha;
                const jsonString = b64DecodeUnicode(fileData.content);
                
                // Parsăm GeoJSON-ul
                mapData = JSON.parse(jsonString);

                // Sortăm locațiile alfabetic ca să le găsești mai ușor în meniu
                mapData.features.sort((a, b) => a.properties.name.localeCompare(b.properties.name));

                // Umplem meniul derulant (Select)
                const selectEl = document.getElementById('stationSelect');
                selectEl.innerHTML = '<option value="">-- Alege o locație --</option>'; // Reset
                
                mapData.features.forEach(feature => {
                    const option = document.createElement('option');
                    option.value = feature.id;
                    option.textContent = feature.properties.name;
                    selectEl.appendChild(option);
                });

                statusEl.innerHTML = `<span class="success">✅ Datele au fost încărcate! (${mapData.features.length} locații găsite)</span>`;
                document.getElementById('editorSection').style.display = 'block';

            } catch (error) {
                console.error(error);
                statusEl.innerHTML = `<span class="error">❌ Eroare: ${error.message}</span>`;
            } finally {
                loadBtn.disabled = false;
                loadBtn.innerText = "📥 Reîncarcă Lista";
            }
        }

        // 2. AFIȘAREA DATELOR CÂND SELECTEZI O LOCAȚIE
        function onStationSelect() {
            const selectedId = document.getElementById('stationSelect').value;
            if (!selectedId) return;

            // Căutăm locația selectată în baza noastră de date din memorie
            const feature = mapData.features.find(f => f.id === selectedId);
            if (feature) {
                document.getElementById('locName').value = feature.properties.name;
                document.getElementById('locDescription').value = feature.properties.description;
            }
        }

        // 3. BUTOANE RAPIDE PENTRU STATUS
        function insertTag(tag) {
            const textarea = document.getElementById('locDescription');
            const start = textarea.selectionStart;
            const end = textarea.selectionEnd;
            const text = textarea.value;
            
            textarea.value = text.substring(0, start) + tag + text.substring(end);
            textarea.focus();
            textarea.selectionEnd = start + tag.length; // Mută cursorul după tag
        }

        // 4. SALVAREA DATELOR ÎNAPOI PE GITHUB
        async function saveMapData() {
            const selectedId = document.getElementById('stationSelect').value;
            const statusEl = document.getElementById('status');
            const saveBtn = document.getElementById('saveBtn');

            if (!selectedId || !mapData) {
                alert("Te rog selectează o locație înainte de a salva!");
                return;
            }

            // Actualizăm obiectul din memorie cu noile date din căsuțe
            const featureIndex = mapData.features.findIndex(f => f.id === selectedId);
            mapData.features[featureIndex].properties.name = document.getElementById('locName').value.trim();
            mapData.features[featureIndex].properties.description = document.getElementById('locDescription').value.trim();

            saveBtn.disabled = true;
            saveBtn.innerText = "Se salvează...";
            statusEl.innerHTML = 'Se procesează actualizarea...';

            const token = document.getElementById('githubToken').value.trim();
            const repo = document.getElementById('repoName').value.trim();
            const owner = 'dragosdxing'; 
            const path = 'fm.json'; 
            const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;

            try {
                // Transformăm înapoi în text JSON, formatat frumos
                const newJsonString = JSON.stringify(mapData, null, 2);
                const encodedContent = b64EncodeUnicode(newJsonString);

                const putRes = await fetch(apiUrl, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `Actualizare hartă: ${mapData.features[featureIndex].properties.name}`,
                        content: encodedContent,
                        sha: fileSha // Oferim SHA-ul vechi ca GitHub să știe că vrem să suprascriem
                    })
                });

                if (!putRes.ok) throw new Error("Eroare la salvarea fișierului pe server.");

                // Actualizăm noul SHA primit după salvare, în caz că vrem să mai facem modificări fără refresh
                const putData = await putRes.json();
                fileSha = putData.content.sha;

                statusEl.innerHTML = '<span class="success">✅ Harta a fost actualizată cu succes! (Durează 1-2 minute să se aplice)</span>';

            } catch (error) {
                console.error(error);
                statusEl.innerHTML = `<span class="error">❌ Eroare: ${error.message}</span>`;
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerText = "💾 Salvează Modificările pe Hartă";
            }
        }
    </script>
</body>
</html>
