<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - FM Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body {
            background-color: #050508;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .admin-panel {
            background: rgba(15, 15, 15, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 30px;
            max-width: 800px; /* Puțin mai lat ca să încapă harta frumos */
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        h2 { text-align: center; color: #ff9900; margin-top: 0; }
        label { display: block; margin-top: 15px; color: #aaaaaa; font-size: 14px; }
        input[type="text"], input[type="password"], select, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: inherit;
        }
        input[readonly] { background: rgba(255, 255, 255, 0.02); color: #666; cursor: not-allowed; border-color: rgba(255, 255, 255, 0.05); }
        textarea { height: 160px; resize: vertical; white-space: pre-wrap; color: #ccc; cursor: not-allowed; }
        input:focus:not([readonly]), select:focus { border-color: #ff9900; outline: none; }
        
        button {
            margin-top: 15px;
            width: 100%;
            padding: 12px;
            background: #ff9900;
            color: #000;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background: #ffaa33; }
        button:disabled { background: #555; cursor: not-allowed; color: #999; }
        
        .btn-load { background: #0066cc; color: white; margin-top: 10px; }
        .btn-load:hover { background: #0088ff; }

        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: rgba(0, 0, 0, 0.4);
            padding: 15px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-top: 5px;
        }
        .radio-group label { margin: 0; color: #fff; font-size: 15px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .radio-group input[type="radio"] { width: auto; margin: 0; accent-color: #ff9900; cursor: pointer; }

        .settings-group { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 6px; margin-bottom: 20px; border: 1px dashed rgba(255,255,255,0.1); }
        #status { margin-top: 20px; text-align: center; font-weight: bold; }
        .success { color: #00ff00; }
        .error { color: #ff4d4d; }
        
        .editor-section { display: none; margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
        .post-control { display: none; }
        
        /* Setări pentru Mini-Hartă */
        #miniMap {
            height: 300px;
            width: 100%;
            margin-top: 10px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 1; /* Previne bug-urile cu meniurile derulante */
        }
        .map-hint { font-size: 12px; color: #ff9900; margin-top: 5px; text-align: right; }
        
        .grid-2-cols {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 768px) { .grid-2-cols { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="admin-panel">
        <h2>🗺️ FM Map - Control Total Emițătoare</h2>

        <div class="settings-group">
            <label>Fișier Țintă (România sau Moldova):</label>
            <select id="targetFile">
                <option value="fm.json">🇷🇴 România (fm.json)</option>
                <option value="fm_md.json">🇲🇩 Moldova (fm_md.json)</option>
            </select>

            <div class="grid-2-cols">
                <div>
                    <label>Nume Repository (Blocat):</label>
                    <input type="text" id="repoName" value="fm-map" readonly> 
                </div>
                <div>
                    <label>GitHub Token:</label>
                    <input type="password" id="githubToken" placeholder="Introdu token-ul aici...">
                </div>
            </div>
            
            <button type="button" class="btn-load" id="loadBtn" onclick="loadMapData()">📥 Încarcă Lista de pe Hartă</button>
        </div>
        
        <div id="status"></div>

        <div class="editor-section" id="editorSection">
            <label>1. Selectează Locația (Emițătorul):</label>
            <select id="stationSelect" onchange="onStationSelect()">
                <option value="">-- Alege o locație --</option>
            </select>

            <div class="post-control" id="postControlArea">
                
                <div class="settings-group" style="margin-top: 15px;">
                    <label>✏️ Nume Locație (Modificabil):</label>
                    <input type="text" id="locNameEdit" onkeyup="updateLocName()">
                    
                    <label>📍 Ajustează Coordonatele (Trage markerul pe hartă):</label>
                    <div id="miniMap"></div>
                    <div class="map-hint">Trage pin-ul albastru pentru a salva automat noile coordonate.</div>
                </div>

                <label>2. Selectează Postul de Radio:</label>
                <select id="subStationSelect" onchange="onSubStationSelect()"></select>

                <label>3. Status Post (declanșează warning-uri pe hartă):</label>
                <div class="radio-group">
                    <label><input type="radio" name="postStatus" value="OK" onchange="applyStatus()"> 🟢 [OK] (Activ - curăță etichetele)</label>
                    <label><input type="radio" name="postStatus" value="(**BLANK**)" onchange="applyStatus()"> 🟡 (**BLANK**) (Purtătoare)</label>
                    <label><input type="radio" name="postStatus" value="(**NO AUDIO**)" onchange="applyStatus()"> 🔕 (**NO AUDIO**) (Fără sunet)</label>
                    <label><input type="radio" name="postStatus" value="(**VERY LOW AUDIO**)" onchange="applyStatus()"> 🟠 (**VERY LOW AUDIO**) (Sunet slab)</label>
                    <label><input type="radio" name="postStatus" value="(**OFF AIR**)" onchange="applyStatus()"> 🔴 (**OFF AIR**) (Oprit)</label>
                    <label><input type="radio" name="postStatus" value="(**IN PLAN**)" onchange="applyStatus()"> ⚪ (**IN PLAN**) (Urmează să emită)</label>
                </div>

                <label>Previzualizare Date (Read-Only):</label>
                <textarea id="locDescription" readonly placeholder="Aici vezi cum se modifică textul..."></textarea>

                <button type="button" onclick="saveMapData()" id="saveBtn">💾 Salvează Modificările pe Hartă</button>
            </div>
        </div>
    </div>

    <script>
        let mapData = null; 
        let fileSha = ""; 
        let currentLines = []; 
        let selectedLineIndex = -1;
        
        // Variabile pentru Leaflet Map
        let mapInstance = null;
        let mapMarker = null;

        function b64EncodeUnicode(str) {
            return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, function toSolidBytes(match, p1) { return String.fromCharCode('0x' + p1); }));
        }

        function b64DecodeUnicode(str) {
            return decodeURIComponent(atob(str).split('').map(function(c) { return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2); }).join(''));
        }

        async function loadMapData() {
            const token = document.getElementById('githubToken').value.trim();
            const repo = document.getElementById('repoName').value.trim();
            const targetFile = document.getElementById('targetFile').value; // fm.json sau fm_md.json
            const statusEl = document.getElementById('status');
            const loadBtn = document.getElementById('loadBtn');

            if (!token || !repo) {
                statusEl.innerHTML = '<span class="error">Te rog introdu Token-ul!</span>';
                return;
            }

            loadBtn.disabled = true;
            loadBtn.innerText = "Se încarcă datele...";
            statusEl.innerHTML = `Se descarcă ${targetFile}...`;
            document.getElementById('postControlArea').style.display = 'none';

            const owner = 'dragosdxing'; 
            const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${targetFile}`;

            try {
                const getRes = await fetch(apiUrl, { headers: { 'Authorization': `Bearer ${token}` } });
                if (!getRes.ok) throw new Error(`Nu am putut accesa ${targetFile}. Verifică repo-ul sau token-ul.`);
                
                const fileData = await getRes.json();
                fileSha = fileData.sha;
                const jsonString = b64DecodeUnicode(fileData.content);
                
                mapData = JSON.parse(jsonString);
                mapData.features.sort((a, b) => a.properties.name.localeCompare(b.properties.name));

                const selectEl = document.getElementById('stationSelect');
                selectEl.innerHTML = '<option value="">-- Alege o locație --</option>'; 
                
                mapData.features.forEach(feature => {
                    const option = document.createElement('option');
                    option.value = feature.id;
                    option.textContent = feature.properties.name;
                    selectEl.appendChild(option);
                });

                statusEl.innerHTML = `<span class="success">✅ ${targetFile} a fost încărcat! (${mapData.features.length} locații)</span>`;
                document.getElementById('editorSection').style.display = 'block';

            } catch (error) {
                console.error(error);
                statusEl.innerHTML = `<span class="error">❌ Eroare: ${error.message}</span>`;
            } finally {
                loadBtn.disabled = false;
                loadBtn.innerText = "📥 Reîncarcă Lista";
            }
        }

        function onStationSelect() {
            const selectedId = document.getElementById('stationSelect').value;
            const postControl = document.getElementById('postControlArea');
            const subSelect = document.getElementById('subStationSelect');
            const textarea = document.getElementById('locDescription');
            const nameEdit = document.getElementById('locNameEdit');

            if (!selectedId) {
                postControl.style.display = 'none';
                return;
            }

            const feature = mapData.features.find(f => f.id === selectedId);
            if (feature) {
                // Setăm numele pentru editare
                nameEdit.value = feature.properties.name;
                
                // Inițializare hartă Leaflet
                initMapAndMarker(feature);

                currentLines = feature.properties.description.split('\n');
                
                subSelect.innerHTML = ''; 
                currentLines.forEach((line, index) => {
                    if(line.trim() !== '') {
                        const option = document.createElement('option');
                        option.value = index;
                        option.textContent = line; 
                        subSelect.appendChild(option);
                    }
                });

                textarea.value = feature.properties.description;
                postControl.style.display = 'block';
                
                // Rezolvă un bug vizual din Leaflet când se afișează dintr-un div ascuns
                setTimeout(() => { if (mapInstance) mapInstance.invalidateSize(); }, 100);
                
                if(subSelect.options.length > 0) {
                    subSelect.selectedIndex = 0;
                    onSubStationSelect();
                }
            }
        }

        // =====================================
        // LOGICA PENTRU MINI-HARTĂ
        // =====================================
        function initMapAndMarker(feature) {
            // GeoJSON are formatul [Longitudine, Latitudine]
            const lng = feature.geometry.coordinates[0];
            const lat = feature.geometry.coordinates[1];

            // Dacă harta nu există, o creăm
            if (!mapInstance) {
                mapInstance = L.map('miniMap').setView([lat, lng], 13);
                
                // Folosim satelitul/străzile (poți schimba layerul dacă preferi altceva)
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    maxZoom: 19,
                    attribution: '© OpenStreetMap'
                }).addTo(mapInstance);

                // Creăm markerul care poate fi tras (draggable)
                mapMarker = L.marker([lat, lng], { draggable: true }).addTo(mapInstance);

                // Când tragi markerul, salvăm noile coordonate
                mapMarker.on('dragend', function(e) {
                    const position = mapMarker.getLatLng();
                    updateCoordinates(position.lat, position.lng);
                });
            } else {
                // Dacă harta există deja, doar o mutăm și mutăm markerul
                mapInstance.setView([lat, lng], 13);
                mapMarker.setLatLng([lat, lng]);
            }
        }

        function updateCoordinates(lat, lng) {
            const selectedId = document.getElementById('stationSelect').value;
            const feature = mapData.features.find(f => f.id === selectedId);
            // Salvăm înapoi în format GeoJSON [Longitudine, Latitudine] !!
            feature.geometry.coordinates = [lng, lat];
        }

        // =====================================
        // LOGICA PENTRU EDITARE NUME
        // =====================================
        function updateLocName() {
            const selectedId = document.getElementById('stationSelect').value;
            const newName = document.getElementById('locNameEdit').value;
            
            const feature = mapData.features.find(f => f.id === selectedId);
            feature.properties.name = newName;
            
            // Actualizăm și numele în meniul derulant ca să se vadă schimbarea în timp real
            const selectEl = document.getElementById('stationSelect');
            selectEl.options[selectEl.selectedIndex].text = newName;
        }


        // =====================================
        // LOGICA PENTRU POSTURI (Neschimbată)
        // =====================================
        function onSubStationSelect() {
            const subSelect = document.getElementById('subStationSelect');
            selectedLineIndex = parseInt(subSelect.value);
            const currentLine = currentLines[selectedLineIndex];

            let foundStatus = false;

            if (currentLine.includes('(**BLANK**)') || currentLine.includes('[BLANK]')) { checkRadio('postStatus', '(**BLANK**)'); foundStatus = true; }
            if (currentLine.includes('(**NO AUDIO**)') || currentLine.includes('[NO AUDIO]')) { checkRadio('postStatus', '(**NO AUDIO**)'); foundStatus = true; }
            if (currentLine.includes('(**OFF AIR**)') || currentLine.includes('(OFF AIR)')) { checkRadio('postStatus', '(**OFF AIR**)'); foundStatus = true; }
            if (currentLine.includes('(**VERY LOW AUDIO**)') || currentLine.includes('[VERY LOW AUDIO]')) { checkRadio('postStatus', '(**VERY LOW AUDIO**)'); foundStatus = true; }
            if (currentLine.includes('(**IN PLAN**)')) { checkRadio('postStatus', '(**IN PLAN**)'); foundStatus = true; }
            
            if (!foundStatus) { checkRadio('postStatus', 'OK'); }
        }

        function checkRadio(name, value) {
            const radios = document.getElementsByName(name);
            for (let i = 0; i < radios.length; i++) {
                if (radios[i].value === value) radios[i].checked = true;
            }
        }

        function applyStatus() {
            if (selectedLineIndex === -1) return;

            let newStatus = "";
            const radios = document.getElementsByName('postStatus');
            for (let i = 0; i < radios.length; i++) {
                if (radios[i].checked) { newStatus = radios[i].value; break; }
            }

            let line = currentLines[selectedLineIndex];

            line = line.replace(/\s*\[BLANK\]/g, '')
                       .replace(/\s*\(\*\*BLANK\*\*\)/g, '')
                       .replace(/\s*\[NO AUDIO\]/g, '')
                       .replace(/\s*\(\*\*NO AUDIO\*\*\)/g, '')
                       .replace(/\s*\(OFF AIR\)/g, '')
                       .replace(/\s*\(\*\*OFF AIR\*\*\)/g, '')
                       .replace(/\s*\[VERY LOW AUDIO\]/g, '')
                       .replace(/\s*\(\*\*VERY LOW AUDIO\*\*\)/g, '')
                       .replace(/\s*\(\*\*IN PLAN\*\*\)/g, '');

            if (newStatus !== 'OK') {
                line = line + ' ' + newStatus;
            }

            currentLines[selectedLineIndex] = line;
            
            const subSelect = document.getElementById('subStationSelect');
            subSelect.options[subSelect.selectedIndex].textContent = line;

            const fullDescription = currentLines.join('\n');
            document.getElementById('locDescription').value = fullDescription;

            const selectedId = document.getElementById('stationSelect').value;
            const featureIndex = mapData.features.findIndex(f => f.id === selectedId);
            mapData.features[featureIndex].properties.description = fullDescription;
        }

        async function saveMapData() {
            const targetFile = document.getElementById('targetFile').value;
            const selectedId = document.getElementById('stationSelect').value;
            const statusEl = document.getElementById('status');
            const saveBtn = document.getElementById('saveBtn');

            if (!selectedId || !mapData) {
                alert("Nicio modificare de salvat!");
                return;
            }

            saveBtn.disabled = true;
            saveBtn.innerText = "Se salvează pe GitHub...";
            statusEl.innerHTML = `Se trimit datele pentru ${targetFile}...`;

            const token = document.getElementById('githubToken').value.trim();
            const repo = document.getElementById('repoName').value.trim();
            const owner = 'dragosdxing'; 
            const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${targetFile}`;

            try {
                const newJsonString = JSON.stringify(mapData, null, 2);
                const encodedContent = b64EncodeUnicode(newJsonString);

                const putRes = await fetch(apiUrl, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: `Actualizare hartă (${targetFile}): Locație și Status (Panou Admin)`,
                        content: encodedContent,
                        sha: fileSha 
                    })
                });

                if (!putRes.ok) throw new Error("Eroare la salvarea pe server.");

                const putData = await putRes.json();
                fileSha = putData.content.sha;

                statusEl.innerHTML = `<span class="success">✅ ${targetFile} a fost actualizat! Modificările apar în 1-2 minute.</span>`;

            } catch (error) {
                console.error(error);
                statusEl.innerHTML = `<span class="error">❌ Eroare: ${error.message}</span>`;
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerText = "💾 Salvează Modificările pe Hartă";
            }
        }
    </script>
</body>
</html>
